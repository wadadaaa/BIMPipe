name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review manually"
        required: false
        type: string

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@claude')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude')
      ) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}

            Review this pull request for BIMPipe.

            Focus on:
            - unintended production behavior changes
            - TypeScript safety
            - test coverage
            - regressions in IFC upload, viewer, and riser placement flow
            - whether the PR stays within the linked Linear issue scope
            - risky changes to floor classification, riser placement profile, fixture detection, grouping, strategy decisions, IFC export, or debug output

            For Riser Placement PRs, pay special attention to:
            - basement and roof exclusion behavior
            - penthouse exception behavior
            - standard floor behavior remaining stable
            - avoiding duplicate risers
            - avoiding implementation of future milestones unless explicitly requested

            Post a concise summary comment on the PR.
            Use inline comments only for specific code issues.
            Do not modify code.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  trigger-codex-after-claude-summary:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.user.login, 'claude') &&
      !contains(github.event.comment.body, '@codex') &&
      !contains(github.event.comment.body, '[codex-triggered]')
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Trigger Codex from Claude summary review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const claudeComment = context.payload.comment.body || "";

            const body = [
              "@codex Please address the latest Claude review comments on this PR.",
              "",
              "[codex-triggered]",
              "",
              "Required workflow:",
              "- Apply the requested fixes.",
              "- Push the changes to the existing PR branch.",
              "- Do not stop at a local diff.",
              "- Do not wait for manual confirmation.",
              "- If a new PR is needed, create it automatically.",
              "- Report tests/build/lint status when done.",
              "",
              "Scope:",
              "- Fix only the issues raised in the Claude review.",
              "- Keep changes limited to this PR / linked Linear issue scope.",
              "- Do not touch unrelated code.",
              "- Do not touch sprinkler/fire-protection code unless the issue explicitly asks for it.",
              "",
              "Claude review:",
              claudeComment,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

  trigger-codex-after-claude-pr-review:
    if: |
      github.event_name == 'pull_request_review' &&
      contains(github.event.review.user.login, 'claude') &&
      github.event.review.body != '' &&
      !contains(github.event.review.body, '@codex') &&
      !contains(github.event.review.body, '[codex-triggered]')
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Trigger Codex from Claude PR review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const claudeReview = context.payload.review.body || "";

            const body = [
              "@codex Please address the latest Claude PR review on this PR.",
              "",
              "[codex-triggered]",
              "",
              "Required workflow:",
              "- Apply the requested fixes.",
              "- Push the changes to the existing PR branch.",
              "- Do not stop at a local diff.",
              "- Do not wait for manual confirmation.",
              "- If a new PR is needed, create it automatically.",
              "- Report tests/build/lint status when done.",
              "",
              "Scope:",
              "- Fix only the issues raised in the Claude review.",
              "- Keep changes limited to this PR / linked Linear issue scope.",
              "- Do not touch unrelated code.",
              "- Do not touch sprinkler/fire-protection code unless the issue explicitly asks for it.",
              "",
              "Claude review:",
              claudeReview,
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
